name: Bug Report
description: Report a bug in GreasyFork Premium
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: GreasyFork Premium Version
      description: What version are you using?
      placeholder: e.g., 1.2.0
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Safari
        - Opera
        - Brave
        - Other
    validations:
      required: true

  - type: dropdown
    id: manager
    attributes:
      label: Userscript Manager
      description: Which userscript manager are you using?
      options:
        - Tampermonkey
        - Violentmonkey
        - Greasemonkey
        - Userscripts (Safari)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See the issue

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Additional Information
      description: Add screenshots or any additional details that may help reproduce the issue.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues
          required: true
        - label: I am using the latest version
          required: true
